<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feats Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,500;0,700;1,500;1,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Work Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fff;color:#444;-webkit-font-smoothing:antialiased}

/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#fff}
.login-card{text-align:center;max-width:400px;width:90%}
.login-card .brand{font-size:2.1rem;font-weight:700;letter-spacing:.01em;margin-bottom:.5rem}
.login-card h1{font-size:1.25rem;font-weight:500;color:#444;margin-bottom:2.5rem}
.google-btn{display:inline-flex;align-items:center;gap:.75rem;padding:.85rem 2rem;border:1px solid #444;border-radius:0;background:white;color:#444;font-size:.85rem;font-weight:500;cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:2px;font-family:'Work Sans',sans-serif}
.google-btn:hover{background:#444;color:#fff;box-shadow:none}
.google-btn svg{width:18px;height:18px}
.keep-logged-in{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:1.5rem;font-size:.8rem;color:#888;cursor:pointer;user-select:none}
.keep-logged-in input[type="checkbox"]{width:14px;height:14px;accent-color:#444;cursor:pointer}
.login-divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;font-size:.75rem;text-transform:uppercase;letter-spacing:1px;color:#ccc}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:#eee}

/* Admin layout */
.admin-layout{display:none;min-height:100vh}
.admin-layout.active{display:flex}
.sidebar{width:74px;background:#262626;color:white;padding:1.4rem .7rem;display:flex;flex-direction:column;flex-shrink:0;transition:width .22s ease,padding .22s ease;position:relative}
.sidebar.is-expanded,.sidebar:hover{width:240px;padding:2rem 1.25rem}
.sidebar.is-collapsed,.sidebar:not(.is-expanded):not(.is-pinned){width:74px;padding:1.4rem .7rem}
.sidebar .brand{font-size:1.4rem;font-weight:700;letter-spacing:.01em;margin-bottom:0;opacity:0;max-height:0;overflow:hidden;transition:opacity .2s ease,max-height .2s ease,margin-bottom .2s ease}
.sidebar.is-expanded .brand,.sidebar:hover .brand{opacity:.9;max-height:40px;margin-bottom:2rem}
.sidebar nav{display:flex;flex-direction:column;gap:.15rem;flex:1;min-height:0}
.sidebar nav a{display:flex;align-items:center;gap:.65rem;padding:.6rem .65rem;border-radius:0;color:rgba(255,255,255,.68);text-decoration:none;font-size:.85rem;font-weight:500;transition:all .2s;cursor:pointer}
.sidebar nav a .nav-icon{font-size:1rem;width:1.2rem;text-align:center;flex-shrink:0}
.sidebar nav a .nav-label{opacity:0;transform:translateX(-6px);white-space:nowrap;transition:opacity .18s ease,transform .18s ease}
.sidebar.is-expanded nav a .nav-label,.sidebar:hover nav a .nav-label{opacity:1;transform:translateX(0)}
.sidebar nav a:hover{background:rgba(255,255,255,.08);color:white}
.sidebar nav a.active{background:rgba(255,255,255,.12);color:white;font-weight:700}
.sidebar-nav-actions{margin-top:auto;padding-top:.75rem;border-top:1px solid rgba(255,255,255,.12)}
.sidebar .user-info{margin-top:auto;padding-top:.65rem;border-top:1px solid rgba(255,255,255,.1);font-size:.75rem;opacity:.5;display:none}
.sidebar.is-expanded .user-info,.sidebar:hover .user-info{display:block}
.main{flex:1;padding:2.5rem;overflow-y:auto;max-height:100vh}
.main h1{font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:2rem}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin-bottom:2rem}
.stat-card{background:#fff;padding:1.5rem;border:1px solid #eee;border-radius:0}
.stat-card h3{font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:#aaa;margin-bottom:.5rem;font-weight:500}
.stat-card .value{font-size:2rem;font-weight:700}
.stat-card .sub{font-size:.75rem;color:#aaa;margin-top:.25rem}

.card{background:#fff;padding:1.5rem;border:1px solid #eee;border-radius:0;margin-bottom:1rem}
.card table{width:100%;border-collapse:collapse;font-size:.85rem}
.card th{text-align:left;padding:.75rem .5rem;border-bottom:2px solid #444;color:#444;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:1px}
.card td{padding:.75rem .5rem;border-bottom:1px solid #f0f0f0}
.card tr:last-child td{border-bottom:none}
.card tr:hover td{background:#fafafa}

.btn{padding:.5rem 1.25rem;border:1px solid #444;border-radius:0;cursor:pointer;font-size:.75rem;font-weight:500;transition:all .3s;text-transform:uppercase;letter-spacing:1.5px;background:#fff;color:#444;font-family:'Work Sans',sans-serif}
.btn:hover{background:#444;color:#fff}
.btn-primary{border-color:#444;background:#fff;color:#444}
.btn-primary:hover{background:#444;color:#fff}
.btn-danger{border-color:#e74c3c;background:#fff;color:#e74c3c}
.btn-danger:hover{background:#e74c3c;color:#fff}
.btn-sm{padding:.3rem .65rem;font-size:.7rem;letter-spacing:1px}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:1000}
.modal.active{display:flex}
.modal-content{background:white;padding:2.5rem;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.modal-content h2{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:1.5rem}
.modal-content label{display:block;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:.35rem;margin-top:1rem;color:#888}
.modal-content input,.modal-content textarea,.modal-content select{width:100%;padding:.6rem .75rem;border:1px solid #ddd;border-radius:0;font-size:.85rem;margin-bottom:.25rem;font-family:'Work Sans',sans-serif}
.modal-content textarea{min-height:100px;resize:vertical}
.modal-footer{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem}

.status-published{color:#27ae60;font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
.status-draft{color:#f39c12;font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}

.badge{display:inline-block;padding:.2rem .5rem;border-radius:0;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-admin{background:#f0f0f0;color:#444}
.badge-superadmin{background:#444;color:#fff}

.article-workspace{display:grid;grid-template-columns:320px 1fr;gap:1rem;min-height:72vh}
.article-workspace.article-list-hidden{grid-template-columns:1fr}
.article-workspace.article-list-hidden .article-list-panel{display:none}
.article-list-panel,.article-editor-panel{background:#fff;border:1px solid #eee;display:flex;flex-direction:column;min-height:0}
.article-list-header{padding:1rem;border-bottom:1px solid #eee;display:flex;flex-direction:column;gap:.75rem}
.article-list-tools{display:flex;gap:.55rem;align-items:center}
.article-search{width:100%;padding:.6rem .75rem;border:1px solid #ddd;border-radius:0;font-size:.85rem;font-family:'Work Sans',sans-serif;flex:1}
.article-list{padding:.65rem;overflow-y:auto;display:flex;flex-direction:column;gap:.5rem}
.article-item{border:1px solid #eee;background:#fff;padding:.7rem;text-align:left;cursor:pointer;transition:all .2s;font-family:'Work Sans',sans-serif}
.article-item:hover{border-color:#bbb;background:#fafafa}
.article-item.active{border-color:#444;background:#f5f5f5}
.article-item-title{font-weight:700;font-size:.85rem;margin-bottom:.3rem}
.article-meta{font-size:.72rem;color:#888;letter-spacing:.2px}
.article-editor-header{padding:1rem;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap}
.article-list-toggle-btn{border:1px solid #ddd;background:#fff;color:#555;padding:.45rem .7rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;font-family:'Work Sans',sans-serif}
.article-list-toggle-btn:hover{background:#f4f4f4}
.article-editor-title{font-size:.9rem;font-weight:700;text-transform:uppercase;letter-spacing:1px}
.article-editor-subtitle{font-size:.72rem;color:#888;letter-spacing:.5px}
.article-editor-tabs{display:flex;align-items:center;gap:.4rem}
.article-editor-tabs button{border:1px solid #ddd;background:#fff;color:#555;padding:.4rem .65rem;font-size:.72rem;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;font-family:'Work Sans',sans-serif}
.article-editor-tabs button.active{border-color:#444;background:#444;color:#fff}
.article-save-status{padding:.55rem 1rem;border-bottom:1px solid #eee;font-size:.72rem;letter-spacing:.4px;color:#777;min-height:2rem;text-transform:uppercase}
.article-save-status.error{color:#b42318;background:#fff5f5}
.article-save-status.success{color:#0f766e;background:#f0fdfa}
.article-editor-body{padding:1rem;overflow-y:auto;flex:1}
.article-field{margin-bottom:.85rem}
.article-field label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:.35rem}
.article-input,.article-textarea,.article-select{width:100%;padding:.6rem .75rem;border:1px solid #ddd;border-radius:0;font-size:.85rem;font-family:'Work Sans',sans-serif}
.article-textarea{min-height:90px;resize:vertical}
.article-properties-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:.75rem}
.editor-canvas{border:1px solid #ddd;min-height:340px;padding:.85rem;line-height:1.6;font-size:.92rem;background:#fff;padding-bottom:3.5rem}
.editor-canvas:focus{outline:none;border-color:#444}
.article-empty-state{padding:2rem 1rem;color:#777;text-align:center;font-size:.85rem;text-transform:uppercase;letter-spacing:1px}
.editor-floating-toolbar{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);z-index:100;display:flex;gap:.35rem;flex-wrap:nowrap;overflow-x:auto;align-items:center;border:1px solid #ddd;background:#fff;padding:.45rem .65rem;min-height:2.6rem;scrollbar-width:thin;border-radius:0;box-shadow:0 2px 12px rgba(0,0,0,.12)}
.editor-floating-toolbar button{border:1px solid #ddd;background:#fff;padding:.3rem .5rem;font-size:.7rem;text-transform:uppercase;letter-spacing:.7px;cursor:pointer;font-family:'Work Sans',sans-serif;white-space:nowrap;flex-shrink:0}
.editor-floating-toolbar button:hover{background:#f4f4f4}
.editor-floating-toolbar button.btn-insert-image{border-color:#444;color:#444;font-weight:600}
.editor-floating-toolbar .editor-floating-sep{width:1px;height:1.6rem;background:#ddd;flex-shrink:0;margin:0 .2rem}
.article-media{position:relative;margin:1rem 0}
.article-media img{max-width:100%;height:auto}
.article-media--full img{width:100%}
.article-media--float-left{float:left;margin-right:1rem;margin-bottom:.5rem;max-width:50%}
.article-media--float-right{float:right;margin-left:1rem;margin-bottom:.5rem;max-width:50%}
.article-media figcaption{font-size:.8rem;color:#888;margin-top:.3rem;text-align:center}
.article-carousel{position:relative;margin:1rem 0;overflow:hidden}
.article-carousel .carousel-slides{position:relative;min-height:200px}
.article-carousel .carousel-slide{display:none}
.article-carousel .carousel-slide.active{display:block}
.article-carousel .carousel-slide img{width:100%;height:auto}
.article-carousel .carousel-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:2;background:rgba(0,0,0,.4);color:#fff;border:none;font-size:1.2rem;padding:.4rem .55rem;cursor:pointer;line-height:1}
.article-carousel .carousel-nav-prev{left:0}
.article-carousel .carousel-nav-next{right:0}
.article-carousel .carousel-nav:hover{background:rgba(0,0,0,.6)}
.article-carousel .carousel-thumbnails{display:flex;gap:.35rem;margin-top:.5rem;overflow-x:auto}
.article-carousel .carousel-thumb{flex-shrink:0;width:44px;height:44px;border:2px solid transparent;cursor:pointer;padding:0;background:none}
.article-carousel .carousel-thumb.active{border-color:#444}
.article-carousel .carousel-thumb img{width:100%;height:100%;object-fit:cover}
.article-carousel .carousel-caption{text-align:center;font-size:.8rem;color:#888;margin-top:.35rem}

/* Image insert UI */
.article-image-insert-panel{display:none;padding:.65rem;border:1px solid #ddd;background:#fafafa;margin:.45rem 0 .2rem}
.article-image-insert-panel.active{display:block}
.article-image-insert-panel label{display:block;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#888;margin-bottom:.3rem}
.article-image-insert-rows{display:flex;flex-direction:column;gap:.5rem}
.article-image-insert-row{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.article-image-insert-row .article-select,.article-image-insert-row .article-input{flex:1;min-width:140px}
.article-image-insert-preview{display:flex;gap:.35rem;flex-wrap:wrap;margin:.4rem 0}
.article-image-insert-preview .img-preview-thumb{width:56px;height:56px;object-fit:cover;border:1px solid #ddd;cursor:pointer;position:relative}
.article-image-insert-preview .img-preview-thumb.selected{border-color:#444;border-width:2px}
.article-image-insert-preview .img-preview-remove{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:#e74c3c;color:#fff;border:none;font-size:.6rem;cursor:pointer;line-height:16px;text-align:center}
.article-image-insert-actions{display:flex;justify-content:flex-end;gap:.45rem;margin-top:.4rem}
.article-image-upload-btn{display:inline-flex;align-items:center;gap:.4rem;padding:.35rem .65rem;border:1px dashed #aaa;background:#fff;color:#666;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;font-family:'Work Sans',sans-serif}
.article-image-upload-btn:hover{background:#f4f4f4;border-color:#888}

.writer-photo-upload{display:flex;flex-direction:column;gap:.75rem}
.writer-photo-upload input[type="file"]{font-size:.85rem;font-family:'Work Sans',sans-serif}
.writer-photo-current{display:flex;align-items:center;gap:.75rem}
.writer-photo-current img{width:60px;height:60px;border-radius:50%;object-fit:cover;border:1px solid #eee}
.writer-photo-upload .btn-sm{font-size:.7rem;padding:.25rem .55rem}

/* Sidebar action items (below nav) */
.sidebar-action{display:flex;align-items:center;gap:.65rem;padding:.5rem .65rem;border-radius:0;color:rgba(255,255,255,.5);font-size:.75rem;text-transform:uppercase;letter-spacing:1px;cursor:pointer;user-select:none;transition:all .2s;border:none;background:none;width:100%;font-family:'Work Sans',sans-serif;overflow:hidden}
.sidebar-action:hover{color:rgba(255,255,255,.8)}
.sidebar-action .nav-icon{font-size:1rem;width:1.2rem;text-align:center;flex-shrink:0}
.sidebar-action .nav-label{opacity:0;transform:translateX(-6px);white-space:nowrap;transition:opacity .18s ease,transform .18s ease}
.sidebar.is-expanded .sidebar-action .nav-label,.sidebar:hover .sidebar-action .nav-label{opacity:1;transform:translateX(0)}
.sidebar-action.logout-action{margin-top:.15rem;border-top:1px solid rgba(255,255,255,.12);padding-top:.75rem;color:rgba(255,255,255,.45)}
.sidebar-action.logout-action:hover{color:#e74c3c}
.sidebar-action input[type="checkbox"]{width:28px;height:14px;appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.2);border-radius:7px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.sidebar-action input[type="checkbox"]::before{content:'';position:absolute;top:1px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:transform .2s}
.sidebar-action input[type="checkbox"]:checked{background:#666}
.sidebar-action input[type="checkbox"]:checked::before{transform:translateX(14px)}
.sidebar-pin-btn{position:absolute;right:6px;top:8px;width:22px;height:22px;border-radius:0;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);font-size:.7rem;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .2s;padding:0}
.sidebar.is-expanded .sidebar-pin-btn,.sidebar:hover .sidebar-pin-btn{display:flex}
.sidebar-pin-btn:hover{background:rgba(255,255,255,.15);color:#fff}
.sidebar.is-pinned .sidebar-pin-btn{display:flex}

/* Dark mode */
[data-theme="dark"] body{background:#1a1a1a;color:#d4d4d4}
[data-theme="dark"] .login-page{background:#1a1a1a}
[data-theme="dark"] .login-card h1{color:#ccc}
[data-theme="dark"] .google-btn{background:#262626;border-color:#555;color:#ccc}
[data-theme="dark"] .google-btn:hover{background:#555;color:#fff}
[data-theme="dark"] .login-card .brand{color:#ccc}
[data-theme="dark"] .keep-logged-in{color:#999}
[data-theme="dark"] .keep-logged-in input[type="checkbox"]{accent-color:#888}
[data-theme="dark"] .sidebar{background:#1a1a1a}
[data-theme="dark"] .main h1{color:#ccc}
[data-theme="dark"] .main{background:#1a1a1a}
[data-theme="dark"] .stat-card{background:#262626;border-color:#333}
[data-theme="dark"] .stat-card h3{color:#888}
[data-theme="dark"] .stat-card .value{color:#e0e0e0}
[data-theme="dark"] .stat-card .sub{color:#888}
[data-theme="dark"] .card{background:#262626;border-color:#333}
[data-theme="dark"] .card th{color:#bbb;border-bottom-color:#555}
[data-theme="dark"] .card td{border-bottom-color:#333}
[data-theme="dark"] .card tr:hover td{background:#2e2e2e}
[data-theme="dark"] .btn{background:#262626;border-color:#555;color:#ccc}
[data-theme="dark"] .btn:hover{background:#555;color:#fff}
[data-theme="dark"] .btn-primary{background:#262626;border-color:#555;color:#ccc}
[data-theme="dark"] .btn-primary:hover{background:#555;color:#fff}
[data-theme="dark"] .btn-danger{background:#262626;border-color:#b42318;color:#e74c3c}
[data-theme="dark"] .btn-danger:hover{background:#b42318;color:#fff}
[data-theme="dark"] .modal-content{background:#262626;border:1px solid #333}
[data-theme="dark"] .modal-content h2{color:#ccc}
[data-theme="dark"] .modal-content label{color:#999}
[data-theme="dark"] .modal-content input,[data-theme="dark"] .modal-content textarea,[data-theme="dark"] .modal-content select{background:#1a1a1a;border-color:#444;color:#ccc}
[data-theme="dark"] .badge-admin{background:#333;color:#ccc}
[data-theme="dark"] .badge-superadmin{background:#555;color:#fff}
[data-theme="dark"] .status-published{color:#4caf50}
[data-theme="dark"] .status-draft{color:#ffb74d}
[data-theme="dark"] .article-list-panel,[data-theme="dark"] .article-editor-panel{background:#262626;border-color:#333}
[data-theme="dark"] .article-list-header{border-bottom-color:#333}
[data-theme="dark"] .article-search{background:#1a1a1a;border-color:#444;color:#ccc}
[data-theme="dark"] .article-item{background:#262626;border-color:#333;color:#ccc}
[data-theme="dark"] .article-item:hover{background:#2e2e2e;border-color:#555}
[data-theme="dark"] .article-item.active{border-color:#888;background:#333}
[data-theme="dark"] .article-meta{color:#888}
[data-theme="dark"] .article-editor-header{border-bottom-color:#333}
[data-theme="dark"] .article-editor-title{color:#ccc}
[data-theme="dark"] .article-editor-subtitle{color:#888}
[data-theme="dark"] .article-editor-tabs button{background:#1a1a1a;border-color:#444;color:#888}
[data-theme="dark"] .article-editor-tabs button.active{background:#555;border-color:#555;color:#fff}
[data-theme="dark"] .article-list-toggle-btn{background:#1a1a1a;border-color:#444;color:#888}
[data-theme="dark"] .article-list-toggle-btn:hover{background:#333;color:#fff}
[data-theme="dark"] .article-save-status{color:#999;border-bottom-color:#333}
[data-theme="dark"] .article-save-status.error{color:#ef9a9a;background:#3e1a1a}
[data-theme="dark"] .article-save-status.success{color:#80cbc4;background:#1a3330}
[data-theme="dark"] .article-field label{color:#999}
[data-theme="dark"] .article-input,[data-theme="dark"] .article-textarea,[data-theme="dark"] .article-select{background:#1a1a1a;border-color:#444;color:#ccc}
[data-theme="dark"] .editor-floating-toolbar{background:#262626;border-color:#444}
[data-theme="dark"] .editor-floating-toolbar button{background:#1a1a1a;border-color:#444;color:#888}
[data-theme="dark"] .editor-floating-toolbar button:hover{background:#333;color:#ccc}
[data-theme="dark"] .editor-floating-toolbar button.btn-insert-image{border-color:#888;color:#ccc}
[data-theme="dark"] .editor-floating-toolbar .editor-floating-sep{background:#444}
[data-theme="dark"] .article-image-insert-panel{background:#1d1d1d;border-color:#444}
[data-theme="dark"] .article-image-insert-panel label{color:#999}
[data-theme="dark"] .article-image-upload-btn{background:#1a1a1a;border-color:#555;color:#999}
[data-theme="dark"] .article-image-upload-btn:hover{background:#333;color:#ccc}
[data-theme="dark"] .article-image-insert-preview .img-preview-thumb{border-color:#444}
[data-theme="dark"] .article-image-insert-preview .img-preview-thumb.selected{border-color:#aaa}
[data-theme="dark"] .editor-floating-toolbar{background:#262626;border-color:#444}
[data-theme="dark"] .editor-floating-toolbar button{background:#1a1a1a;border-color:#444;color:#888}
[data-theme="dark"] .editor-floating-toolbar button:hover{background:#333;color:#ccc}
[data-theme="dark"] .editor-floating-toolbar button.btn-insert-image{border-color:#888;color:#ccc}
[data-theme="dark"] .editor-floating-toolbar .editor-floating-sep{background:#444}
[data-theme="dark"] .article-image-insert-panel{background:#1d1d1d;border-color:#444}
[data-theme="dark"] .article-image-insert-panel label{color:#999}
[data-theme="dark"] .article-image-upload-btn{background:#1a1a1a;border-color:#555;color:#999}
[data-theme="dark"] .article-image-upload-btn:hover{background:#333;color:#ccc}
[data-theme="dark"] .article-image-insert-preview .img-preview-thumb{border-color:#444}
[data-theme="dark"] .article-image-insert-preview .img-preview-thumb.selected{border-color:#aaa}
[data-theme="dark"] .sidebar-action{color:rgba(255,255,255,.45)}
[data-theme="dark"] .sidebar-action:hover{color:rgba(255,255,255,.75)}
[data-theme="dark"] .sidebar-pin-btn{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
[data-theme="dark"] .sidebar-pin-btn:hover{background:rgba(255,255,255,.12);color:#fff}
[data-theme="dark"] .article-media figcaption{color:#888}
[data-theme="dark"] .article-carousel .carousel-nav{background:rgba(0,0,0,.6)}
[data-theme="dark"] .article-carousel .carousel-caption{color:#888}

@media(max-width:1100px){.article-workspace,.article-workspace.article-list-hidden{grid-template-columns:1fr}.article-list-panel{max-height:280px}.article-workspace.article-list-hidden .article-list-panel{display:flex}}
@media(max-width:768px){.sidebar,.sidebar.is-expanded,.sidebar:hover{width:60px;padding:.75rem}.sidebar .brand,.sidebar .user-info,.sidebar nav a .nav-label,.sidebar-action .nav-label,.sidebar-pin-btn{display:none}.main{padding:1.5rem}.stats-grid{grid-template-columns:repeat(2,1fr)}.article-list-tools{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="brand">Feats.</div>
    <h1>Admin Access</h1>
    <button class="google-btn" onclick="loginWithGoogle()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </button>
    <label class="keep-logged-in">
      <input type="checkbox" id="keepLoggedIn" checked>
      Keep me logged in
    </label>
  </div>
</div>

<div class="admin-layout" id="adminLayout">
<aside class="sidebar">
    <button class="sidebar-pin-btn" onclick="toggleSidebarPin()" title="Pin sidebar" id="sidebarPinBtn">⧖</button>
    <div class="brand">Feats.</div>
    <nav>
      <a class="active" data-tab="dashboard" onclick="showTab('dashboard', this)"><span class="nav-icon">⌂</span><span class="nav-label">Dashboard</span></a>
      <a data-tab="articles" onclick="showTab('articles', this)"><span class="nav-icon">✎</span><span class="nav-label">Articles</span></a>
      <a data-tab="writers" onclick="showTab('writers', this)"><span class="nav-icon">✦</span><span class="nav-label">Writers</span></a>
      <a data-tab="users" onclick="showTab('users', this)"><span class="nav-icon">⚑</span><span class="nav-label">Admin Users</span></a>
      <a data-tab="analytics" onclick="showTab('analytics', this)"><span class="nav-icon">▣</span><span class="nav-label">Analytics</span></a>
      <a data-tab="tech" onclick="showTab('tech', this)"><span class="nav-icon">⚙</span><span class="nav-label">Technical</span></a>
    </nav>
    <div class="sidebar-nav-actions">
      <label class="sidebar-action"><span class="nav-icon">☾</span><span class="nav-label">Dark Mode</span><input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode(this.checked)"></label>
      <a class="sidebar-action logout-action" onclick="logout()"><span class="nav-icon">⇥</span><span class="nav-label">Logout</span></a>
    </div>
    <div class="user-info" id="userInfo"></div>
  </aside>
  <main class="main" id="mainContent">
    <!-- Content loaded dynamically -->
  </main>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>
// ===== STATE =====
var API = 'https://feats-live.louishitchcock.xyz';
var currentUser = null;

// ===== AUTH =====
function loginWithGoogle() {
  window.location.href = API + '/auth/google';
}
function logout() {
  localStorage.removeItem('feats_admin_token');
  currentUser = null;
  window.history.replaceState({}, document.title, '/admin');
  window.location.reload();
}

function checkAuth() {
  var token = localStorage.getItem('feats_admin_token');
  if (!token) return;
  fetch(API + '/admin/me', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); })
    .then(function(user) {
      currentUser = user;
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('adminLayout').classList.add('active');
      document.getElementById('userInfo').textContent = user.name + ' (' + user.role + ')';
      try {
        showTab('dashboard');
      } catch (e) {
        console.error('Failed to load default tab', e);
      }
    })
    .catch(function(err) {
      console.error('Auth check failed', err);
      localStorage.removeItem('feats_admin_token');
    });
}

// Extract token from URL after OAuth redirect
var params = new URLSearchParams(window.location.search);
if (params.get('token')) {
  localStorage.setItem('feats_admin_token', params.get('token'));
  window.history.replaceState({}, document.title, '/admin');
  checkAuth();
} else {
  checkAuth();
}

// ===== TABS =====
function showTab(name, clickedEl) {
  document.querySelectorAll('.sidebar nav a').forEach(function(a) { a.classList.remove('active'); });
  if (clickedEl && clickedEl.classList) {
    clickedEl.classList.add('active');
  } else {
    var activeNav = document.querySelector('.sidebar nav a[data-tab="' + name + '"]');
    if (activeNav) activeNav.classList.add('active');
  }

  switch(name) {
    case 'dashboard': loadDashboard(); break;
    case 'articles': loadArticles(); break;
    case 'writers': loadWriters(); break;
    case 'users': loadUsers(); break;
    case 'analytics': loadAnalytics(); break;
    case 'tech': loadTech(); break;
  }
}

// ===== API HELPERS =====
function apiHeaders() {
  var h = { 'Content-Type': 'application/json' };
  var token = localStorage.getItem('feats_admin_token');
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}

function apiGet(path) {
  return fetch(API + path, { headers: apiHeaders() }).then(function(r) {
    if (r.status === 401) { localStorage.removeItem('feats_admin_token'); window.location.reload(); }
    if (!r.ok) throw new Error(r.status);
    return r.json();
  });
}

function apiPost(path, body) {
  return fetch(API + path, { method: 'POST', headers: apiHeaders(), body: JSON.stringify(body) }).then(function(r) {
    if (r.status === 401) { localStorage.removeItem('feats_admin_token'); window.location.reload(); }
    return r;
  });
}

function apiPut(path, body) {
  return fetch(API + path, { method: 'PUT', headers: apiHeaders(), body: JSON.stringify(body) }).then(function(r) {
    if (r.status === 401) { localStorage.removeItem('feats_admin_token'); window.location.reload(); }
    return r;
  });
}

function apiDelete(path) {
  return fetch(API + path, { method: 'DELETE', headers: apiHeaders() }).then(function(r) {
    if (r.status === 401) { localStorage.removeItem('feats_admin_token'); window.location.reload(); }
    return r;
  });
}

// ===== MODAL =====
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.getElementById('modalContent').innerHTML = '';
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ===== DASHBOARD =====
function loadDashboard() {
  var main = document.getElementById('mainContent');
  main.innerHTML = '<h1>Dashboard</h1><div class="stats-grid" id="statsGrid"></div><div id="recentActivity"></div>';

  apiGet('/admin/dashboard').then(function(d) {
    var grid = document.getElementById('statsGrid');
    grid.innerHTML = '';
    var stats = [
      { label: 'Total Articles', value: d.totalArticles, sub: d.publishedArticles + ' published' },
      { label: 'Total Writers', value: d.totalWriters, sub: '' },
      { label: 'Total Views', value: d.totalViews || 0, sub: d.uniqueVisitors ? d.uniqueVisitors + ' unique' : '' },
      { label: 'Storage Used', value: d.storageMB ? d.storageMB + ' MB' : 'N/A', sub: '' }
    ];
    stats.forEach(function(s) {
      grid.innerHTML += '<div class="stat-card"><h3>' + s.label + '</h3><div class="value">' + s.value + '</div><div class="sub">' + s.sub + '</div></div>';
    });
  });
}

// ===== ARTICLES =====
var articleState = {
  list: [],
  filtered: [],
  writers: [],
  current: null,
  selectedId: null,
  panel: 'editor',
  listCollapsed: false,
  savedRange: null,
  recentImages: [],
  carouselSeed: 0
};

function escAttr(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

function normalizeArticle(a) {
  return {
    id: a.id || null,
    title: a.title || '',
    url_id: a.url_id || '',
    author: a.author || '',
    excerpt: a.excerpt || '',
    body: a.body || '<p></p>',
    categories: a.categories || '',
    tags: a.tags || '',
    cover_url: a.cover_url || '',
    publish_date: (a.publish_date || '').slice(0,16),
    status: a.status || 'draft'
  };
}

function splitWriters(author) {
  return String(author || '').split(',').map(function(w) { return w.trim(); }).filter(Boolean);
}

function nowAsLocalDateTime() {
  var now = new Date();
  var tz = now.getTimezoneOffset() * 60000;
  return new Date(now - tz).toISOString().slice(0,16);
}

function loadArticles() {
  var main = document.getElementById('mainContent');
main.innerHTML = '<h1>Articles</h1><div class="article-workspace" id="articleWorkspace"><section class="article-list-panel"><div class="article-list-header"><div class="article-list-tools"><input id="articleSearchInput" class="article-search" placeholder="Search titles, slugs, or writers" oninput="filterArticleList(this.value)"><button class="btn btn-primary" onclick="startNewArticle()">+ New Article</button></div></div><div class="article-list" id="articleList"></div></section><section class="article-editor-panel"><div class="article-editor-header"><div><div class="article-editor-title" id="articleEditorTitle">Loading articles...</div><div class="article-editor-subtitle" id="articleEditorSubtitle"></div></div><div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap"><button id="articleListToggleBtn" class="article-list-toggle-btn" onclick="toggleArticleListPane()">Hide Selector</button><div class="article-editor-tabs"><button id="articleTabEditor" onclick="switchArticlePanel(&quot;editor&quot;)">Editor</button><button id="articleTabProperties" onclick="switchArticlePanel(&quot;properties&quot;)">Properties</button></div><button class="btn btn-primary" onclick="saveCurrentArticle()">Save</button></div></div><div id="articleSaveStatus" class="article-save-status">Loading article list...</div><div class="article-editor-body" id="articleEditorBody"></div></section></div>';

  articleState.list = [];
  articleState.filtered = [];
  articleState.writers = [];
  articleState.current = null;
  articleState.selectedId = null;
  articleState.panel = 'editor';
  articleState.previewPath = '';
  articleState.listCollapsed = false;
  articleState.savedRange = null;
  articleState.carouselSeed = 0;
  refreshArticleListPaneState();

  Promise.all([
    apiGet('/admin/articles'),
    apiGet('/admin/writers').catch(function() { return { writers: [] }; })
  ]).then(function(payloads) {
    var articlePayload = payloads[0] || { articles: [] };
    var writerPayload = payloads[1] || { writers: [] };
    articleState.list = (articlePayload.articles || []).map(normalizeArticle);
    articleState.filtered = articleState.list.slice();
    articleState.writers = (writerPayload.writers || []).map(function(w) { return w.name; });
    renderArticleList();
    if (articleState.list.length) {
      selectArticleFromList(articleState.list[0].id);
    } else {
      startNewArticle();
      setArticleSaveStatus('No articles yet. Start writing your first one.', false);
    }
  }).catch(function(err) {
    document.getElementById('articleList').innerHTML = '<div class="article-empty-state">Failed to load articles.</div>';
    document.getElementById('articleEditorBody').innerHTML = '<div class="article-empty-state">Unable to load data: ' + esc(err.message) + '</div>';
    setArticleSaveStatus('Failed to load articles', true);
  });
}

function toggleArticleListPane(forceVisible) {
  if (typeof forceVisible === 'boolean') {
    articleState.listCollapsed = !forceVisible;
  } else {
    articleState.listCollapsed = !articleState.listCollapsed;
  }
  refreshArticleListPaneState();
}

function refreshArticleListPaneState() {
  var workspace = document.getElementById('articleWorkspace');
  if (!workspace) return;
  if (articleState.listCollapsed) workspace.classList.add('article-list-hidden');
  else workspace.classList.remove('article-list-hidden');
  var toggleBtn = document.getElementById('articleListToggleBtn');
  if (toggleBtn) toggleBtn.textContent = articleState.listCollapsed ? 'Show Selector' : 'Hide Selector';
}

function setArticleSaveStatus(message, isError, isSuccess) {
  var el = document.getElementById('articleSaveStatus');
  if (!el) return;
  el.className = 'article-save-status';
  if (isError) el.classList.add('error');
  if (isSuccess) el.classList.add('success');
  el.textContent = message || '';
}

function filterArticleList(query) {
  var q = String(query || '').toLowerCase().trim();
  if (!q) {
    articleState.filtered = articleState.list.slice();
  } else {
    articleState.filtered = articleState.list.filter(function(a) {
      return String(a.title || '').toLowerCase().includes(q) ||
             String(a.url_id || '').toLowerCase().includes(q) ||
             String(a.author || '').toLowerCase().includes(q);
    });
  }
  renderArticleList();
}

function renderArticleList() {
  var el = document.getElementById('articleList');
  if (!el) return;
  if (!articleState.filtered.length) {
    el.innerHTML = '<div class="article-empty-state">No matching articles.</div>';
    return;
  }
  var html = '';
  articleState.filtered.forEach(function(a) {
    var active = articleState.selectedId === a.id ? ' active' : '';
    var dateText = (a.publish_date || '').slice(0,10);
    html += '<button class="article-item' + active + '" onclick="selectArticleFromList(' + a.id + ')"><div class="article-item-title">' + esc(a.title || 'Untitled') + '</div><div class="article-meta">' + esc(a.url_id || 'no-slug') + ' â€¢ ' + esc(a.author || 'No writer') + '</div><div class="article-meta">' + esc(a.status || 'draft') + (dateText ? ' â€¢ ' + esc(dateText) : '') + '</div></button>';
  });
  el.innerHTML = html;
}

function startNewArticle() {
  captureCurrentArticleDraft();
  articleState.selectedId = null;
  articleState.current = normalizeArticle({
    id: null,
    title: 'Untitled Article',
    url_id: '',
    author: '',
    excerpt: '',
    body: '<p></p>',
    categories: '',
    tags: '',
    cover_url: '',
    publish_date: nowAsLocalDateTime(),
    status: 'draft'
  });
  articleState.panel = 'editor';
  renderArticleList();
  renderArticleWorkspace();
  setArticleSaveStatus('Editing new article draft', false);
}

function selectArticleFromList(id) {
  captureCurrentArticleDraft();
  articleState.selectedId = id;
  articleState.panel = 'editor';
  renderArticleList();
  document.getElementById('articleEditorTitle').textContent = 'Loading article...';
  document.getElementById('articleEditorSubtitle').textContent = '';
  document.getElementById('articleEditorBody').innerHTML = '<div class="article-empty-state">Loading selected article...</div>';
  apiGet('/admin/articles/' + id).then(function(data) {
    articleState.current = normalizeArticle(data.article || {});
    articleState.selectedId = articleState.current.id;
    renderArticleList();
    renderArticleWorkspace();
    setArticleSaveStatus('Loaded article', false);
  }).catch(function(err) {
    setArticleSaveStatus('Could not load article: ' + err.message, true);
  });
}

function switchArticlePanel(panel) {
  if (!articleState.current) return;
  captureCurrentArticleDraft();
  articleState.panel = panel;
  renderArticleWorkspace();
}

function captureCurrentArticleDraft() {
  if (!articleState.current) return;
  var titleEl = document.getElementById('articleTitleInput');
  var slugEl = document.getElementById('articleSlugInput');
  var excerptEl = document.getElementById('articleExcerptInput');
  var bodyEl = document.getElementById('articleBodyEditor');
  var authorEl = document.getElementById('articleAuthorInput');
  var categoriesEl = document.getElementById('articleCategoriesInput');
  var tagsEl = document.getElementById('articleTagsInput');
  var coverEl = document.getElementById('articleCoverInput');
  var publishEl = document.getElementById('articlePublishInput');
  var statusEl = document.getElementById('articleStatusInput');

  if (titleEl) articleState.current.title = titleEl.value;
  if (slugEl) articleState.current.url_id = slugEl.value.trim();
  if (excerptEl) articleState.current.excerpt = excerptEl.value;
  if (bodyEl) articleState.current.body = bodyEl.innerHTML;
  if (authorEl) articleState.current.author = authorEl.value;
  if (categoriesEl) articleState.current.categories = categoriesEl.value;
  if (tagsEl) articleState.current.tags = tagsEl.value;
  if (coverEl) articleState.current.cover_url = coverEl.value;
  if (publishEl) articleState.current.publish_date = publishEl.value;
  if (statusEl) articleState.current.status = statusEl.value;
}

function renderArticleWorkspace() {
  var current = articleState.current;
  if (!current) return;
  var titleEl = document.getElementById('articleEditorTitle');
  var subtitleEl = document.getElementById('articleEditorSubtitle');
  if (titleEl) titleEl.textContent = current.title || 'Untitled Article';
  if (subtitleEl) subtitleEl.textContent = (current.url_id ? ('/' + current.url_id) : 'New article draft') + ' â€¢ ' + (current.status || 'draft');

  ['articleTabEditor','articleTabProperties'].forEach(function(id) {
    var tab = document.getElementById(id);
    if (!tab) return;
    tab.classList.remove('active');
  });
  if (articleState.panel === 'editor') document.getElementById('articleTabEditor').classList.add('active');
  if (articleState.panel === 'properties') document.getElementById('articleTabProperties').classList.add('active');
  refreshArticleListPaneState();

  var body = document.getElementById('articleEditorBody');
  if (!body) return;
  if (articleState.panel === 'editor') {
    body.innerHTML = getArticleEditorHtml(current);
    initializeArticleEditor();
  }
  if (articleState.panel === 'properties') body.innerHTML = getArticlePropertiesHtml(current);
}


function getArticleEditorHtml(article) {
  var select = document.getElementById('articleWritersSelect');
  var input = document.getElementById('articleAuthorInput');
  if (!select || !input) return;
  var selected = [];
  for (var i = 0; i < select.options.length; i++) {
    if (select.options[i].selected) selected.push(select.options[i].value);
  }
  input.value = selected.join(', ');
}

function getArticleEditorHtml(article) {
  var recentHtml = '';
  if (articleState.recentImages && articleState.recentImages.length) {
    recentHtml = '<div class="article-image-insert-row"><label>Recent media</label><div class="article-image-insert-preview">';
    articleState.recentImages.forEach(function(url, idx) {
      recentHtml += '<img src="' + escAttr(url) + '" class="img-preview-thumb" onclick="toggleImageSelection(this,&quot;' + escAttr(url) + '&quot;)" data-url="' + escAttr(url) + '">';
    });
    recentHtml += '</div></div>';
  }
  return '<div class="article-field"><label>Title</label><input id="articleTitleInput" class="article-input" value="' + escAttr(article.title) + '" placeholder="Article title"></div><div class="article-field"><label>Article Body</label><div id="articleBodyEditor" class="editor-canvas" contenteditable="true">' + (article.body || '<p></p>') + '</div><div class="editor-floating-toolbar"><button type="button" onclick="applyArticleFormat(&quot;bold&quot;)"><b>B</b></button><button type="button" onclick="applyArticleFormat(&quot;italic&quot;)"><i>I</i></button><button type="button" onclick="applyArticleFormat(&quot;underline&quot;)"><u>U</u></button><span class="editor-floating-sep"></span><button type="button" onclick="formatArticleHeading()">H2</button><button type="button" onclick="applyArticleFormat(&quot;insertUnorderedList&quot;)">UL</button><button type="button" onclick="applyArticleFormat(&quot;insertOrderedList&quot;)">OL</button><span class="editor-floating-sep"></span><button type="button" onclick="insertArticleLink()">Link</button><button type="button" onclick="applyArticleFormat(&quot;removeFormat&quot;)">Clear</button><span class="editor-floating-sep"></span><button type="button" class="btn-insert-image" onclick="toggleArticleImagePanel()">+ IMAGE</button></div><div id="articleImageInsertPanel" class="article-image-insert-panel"><div class="article-image-insert-rows">' + recentHtml + '<div class="article-image-insert-row"><label>Upload media</label><input type="file" id="articleImageUploadInput" accept="image/*" multiple onchange="handleArticleImageUpload(this.files)"><input type="file" id="articleImageUploadInputSingle" accept="image/*" style="display:none"></div><div class="article-image-insert-row"><label>Layout</label><select id="articleImageLayoutInput" class="article-select" onchange="toggleArticleCarouselInput()"><option value="full">Full Width</option><option value="left">Float Left</option><option value="right">Float Right</option><option value="carousel">Carousel</option></select><input id="articleImageCaptionInput" class="article-input" placeholder="Optional caption"></div><div id="articleCarouselMultiRow" class="article-image-insert-row" style="display:none"><div id="articleCarouselOrdered" class="article-image-insert-preview"></div></div></div><div class="article-image-insert-actions"><button type="button" class="btn btn-sm" onclick="toggleArticleImagePanel(false)">Cancel</button><button type="button" class="btn btn-sm btn-primary" onclick="insertArticleImageBlock()">Insert</button></div></div></div>';
}

function getArticlePropertiesHtml(article) {
  var options = '';
  articleState.writers.forEach(function(name) {
    var selected = splitWriters(article.author).includes(name) ? ' selected' : '';
    options += '<option value="' + escAttr(name) + '"' + selected + '>' + esc(name) + '</option>';
  });
  return '<div class="article-properties-grid"><div class="article-field"><label>Slug (URL ID)</label><input id="articleSlugInput" class="article-input" value="' + escAttr(article.url_id) + '" placeholder="your-article-slug"></div><div class="article-field"><label>Status</label><select id="articleStatusInput" class="article-select"><option value="publish"' + (article.status === 'publish' ? ' selected' : '') + '>Published</option><option value="draft"' + (article.status !== 'publish' ? ' selected' : '') + '>Draft</option></select></div><div class="article-field"><label>Publish Date</label><input id="articlePublishInput" class="article-input" type="datetime-local" value="' + escAttr(article.publish_date || nowAsLocalDateTime()) + '"></div><div class="article-field"><label>Writer(s)</label><select id="articleWritersSelect" class="article-select" multiple size="5" onchange="syncArticleAuthorFromSelection()">' + options + '</select></div><div class="article-field"><label>Author Field (stored)</label><input id="articleAuthorInput" class="article-input" value="' + escAttr(article.author) + '" placeholder="Comma-separated writer names"></div><div class="article-field"><label>Tags</label><input id="articleTagsInput" class="article-input" value="' + escAttr(article.tags) + '" placeholder="news, live-review, interview"></div><div class="article-field"><label>Categories</label><input id="articleCategoriesInput" class="article-input" value="' + escAttr(article.categories) + '" placeholder="Rock, Live Reviews"></div><div class="article-field" style="grid-column:1 / -1"><label>Excerpt</label><textarea id="articleExcerptInput" class="article-textarea" placeholder="Short summary for cards and metadata">' + esc(article.excerpt) + '</textarea></div><div class="article-field" style="grid-column:1 / -1"><label>Thumbnail / Cover URL</label><input id="articleCoverInput" class="article-input" value="' + escAttr(article.cover_url) + '" placeholder="https://..."></div></div>' + (article.id ? '<div style="margin-top:1rem"><button class="btn btn-danger" onclick="deleteCurrentArticle()">Delete Article</button></div>' : '');
}

function initializeArticleEditor() {
  var editor = document.getElementById('articleBodyEditor');
  if (!editor) return;
  editor.addEventListener('mouseup', saveEditorSelection);
  editor.addEventListener('keyup', saveEditorSelection);
  editor.addEventListener('focus', saveEditorSelection);
  editor.addEventListener('blur', saveEditorSelection);
  toggleArticleImagePanel(false);
  saveEditorSelection();
}

function saveEditorSelection() {
  var editor = document.getElementById('articleBodyEditor');
  if (!editor) return;
  var sel = window.getSelection();
  if (!sel || !sel.rangeCount) return;
  var range = sel.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;
  articleState.savedRange = range.cloneRange();
}

function restoreEditorSelection() {
  var editor = document.getElementById('articleBodyEditor');
  if (!editor || !articleState.savedRange) return false;
  var sel = window.getSelection();
  if (!sel) return false;
  try {
    sel.removeAllRanges();
    sel.addRange(articleState.savedRange.cloneRange());
    return true;
  } catch (e) {
    return false;
  }
}

function executeArticleEditorCommand(command, value) {
  var editor = document.getElementById('articleBodyEditor');
  if (!editor) return;
  editor.focus();
  restoreEditorSelection();
  document.execCommand(command, false, value == null ? null : value);
  saveEditorSelection();
  captureCurrentArticleDraft();
}

function applyArticleFormat(command) {
  executeArticleEditorCommand(command, null);
}

function formatArticleHeading() {
  executeArticleEditorCommand('formatBlock', 'H2');
}

function insertArticleLink() {
  var url = prompt('Enter URL');
  if (!url) return;
  executeArticleEditorCommand('createLink', url.trim());
}

function toggleArticleImagePanel(forceOpen) {
  var panel = document.getElementById('articleImageInsertPanel');
  if (!panel) return;
  var shouldOpen = typeof forceOpen === 'boolean' ? forceOpen : !panel.classList.contains('active');
  if (shouldOpen) {
    panel.classList.add('active');
    toggleArticleCarouselInput();
    saveEditorSelection();
  } else {
    panel.classList.remove('active');
  }
}

function toggleArticleCarouselInput() {
  var layoutInput = document.getElementById('articleImageLayoutInput');
  var multiRow = document.getElementById('articleCarouselMultiRow');
  if (!layoutInput || !multiRow) return;
  multiRow.style.display = layoutInput.value === 'carousel' ? 'flex' : 'none';
}

var imageUploadQueue = [];

function handleArticleImageUpload(files) {
  if (!files || !files.length) return;
  var preview = document.querySelector('.article-image-insert-preview');
  var uploadInput = document.getElementById('articleImageUploadInput');
  var orderedContainer = document.getElementById('articleCarouselOrdered');
  Array.from(files).forEach(function(file) {
    uploadInput.value = '';
    var objUrl = URL.createObjectURL(file);
    imageUploadQueue.push({ file: file, objUrl: objUrl, url: null });
    var thumbHtml = '<div style="position:relative;display:inline-block"><img src="' + objUrl + '" class="img-preview-thumb selected" data-queue-idx="' + (imageUploadQueue.length - 1) + '"><button class="img-preview-remove" onclick="removeImageFromUploadQueue(this.parentElement)">x</button></div>';
    if (preview) preview.innerHTML += thumbHtml;
    if (orderedContainer) orderedContainer.innerHTML += thumbHtml;
  });
  if (orderedContainer && orderedContainer.children.length) {
    document.getElementById('articleCarouselMultiRow').style.display = 'flex';
  }
  setArticleSaveStatus(imageUploadQueue.length + ' image(s) staged for upload', false, true);
}

function removeImageFromUploadQueue(container) {
  var img = container && container.querySelector('img');
  if (!img) return;
  var idx = parseInt(img.getAttribute('data-queue-idx'), 10);
  if (!isNaN(idx) && imageUploadQueue[idx]) {
    URL.revokeObjectURL(imageUploadQueue[idx].objUrl);
    imageUploadQueue[idx] = null;
  }
  container.parentElement.removeChild(container);
  var orderedContainer = document.getElementById('articleCarouselOrdered');
  if (orderedContainer && !orderedContainer.children.length) {
    document.getElementById('articleCarouselMultiRow').style.display = 'none';
  }
}

function insertArticleImageBlock() {
  var layoutInput = document.getElementById('articleImageLayoutInput');
  var captionInput = document.getElementById('articleImageCaptionInput');
  if (!layoutInput) return;
  var layout = layoutInput.value || 'full';
  var caption = captionInput ? captionInput.value.trim() : '';

  var queuedItems = imageUploadQueue.filter(function(item) { return item !== null; });
  if (!queuedItems.length) {
    setArticleSaveStatus('Upload at least one image before inserting', true);
    return;
  }

  setArticleSaveStatus('Uploading images...', false);

  var uploadPromises = queuedItems.map(function(item) {
    if (item.url) return Promise.resolve(item.url);
    return uploadImage(item.file).then(function(url) {
      item.url = url;
      articleState.recentImages = articleState.recentImages || [];
      if (articleState.recentImages.indexOf(url) === -1) articleState.recentImages.unshift(url);
      if (articleState.recentImages.length > 20) articleState.recentImages.length = 20;
      return url;
    });
  });

  Promise.all(uploadPromises).then(function(urls) {
    var html;
    if (layout === 'carousel') {
      html = buildArticleCarouselHtml(urls, caption);
    } else {
      html = buildArticleFigureHtml(urls[0], layout, caption);
    }

    // Clean up blob URLs
    queuedItems.forEach(function(item) {
      if (item.objUrl) URL.revokeObjectURL(item.objUrl);
    });
    imageUploadQueue = [];

    if (insertArticleHtmlAtCursor(html)) {
      setArticleSaveStatus('Image block inserted', false, true);
      if (captionInput) captionInput.value = '';
      toggleArticleImagePanel(false);
      var preview = document.querySelector('.article-image-insert-preview');
      if (preview) preview.innerHTML = '';
      var ordered = document.getElementById('articleCarouselOrdered');
      if (ordered) ordered.innerHTML = '';
      document.getElementById('articleCarouselMultiRow').style.display = 'none';
    } else {
      setArticleSaveStatus('Could not insert image block', true);
    }
  }).catch(function(err) {
    setArticleSaveStatus('Upload failed: ' + err.message, true);
  });
}

function buildArticlePayload() {
  captureCurrentArticleDraft();
  return {
    title: articleState.current.title,
    url_id: articleState.current.url_id,
    author: articleState.current.author,
    excerpt: articleState.current.excerpt,
    body: articleState.current.body,
    categories: articleState.current.categories,
    tags: articleState.current.tags,
    cover_url: articleState.current.cover_url,
    publish_date: articleState.current.publish_date || nowAsLocalDateTime(),
    status: articleState.current.status || 'draft'
  };
}

function saveCurrentArticle() {
  if (!articleState.current) return;
  var payload = buildArticlePayload();
  if (!payload.title || !payload.url_id) {
    setArticleSaveStatus('Title and slug are required before saving', true);
    return;
  }
  setArticleSaveStatus('Saving article...', false);
  var savePromise;
  if (articleState.current.id) {
    savePromise = apiPut('/admin/articles/' + articleState.current.id, payload);
  } else {
    savePromise = apiPost('/admin/articles', payload);
  }
  savePromise.then(function() {
    setArticleSaveStatus('Article saved', false, true);
    refreshArticleListAfterSave(payload.url_id, articleState.current.id);
  }).catch(function(err) {
    setArticleSaveStatus('Save failed: ' + err.message, true);
  });
}

function refreshArticleListAfterSave(savedSlug, existingId) {
  apiGet('/admin/articles').then(function(data) {
    articleState.list = (data.articles || []).map(normalizeArticle);
    var searchInput = document.getElementById('articleSearchInput');
    filterArticleList(searchInput ? searchInput.value : '');
    if (existingId) {
      selectArticleFromList(existingId);
      return;
    }
    var created = articleState.list.find(function(a) { return a.url_id === savedSlug; });
    if (created) {
      selectArticleFromList(created.id);
    } else {
      renderArticleWorkspace();
    }
  });
}

function deleteCurrentArticle() {
  if (!articleState.current || !articleState.current.id) return;
  if (!confirm('Delete this article?')) return;
  var id = articleState.current.id;
  apiDelete('/admin/articles/' + id).then(function() {
    setArticleSaveStatus('Article deleted', false, true);
    articleState.current = null;
    articleState.selectedId = null;
    return apiGet('/admin/articles');
  }).then(function(data) {
    articleState.list = (data.articles || []).map(normalizeArticle);
    filterArticleList(document.getElementById('articleSearchInput') ? document.getElementById('articleSearchInput').value : '');
    if (articleState.list.length) selectArticleFromList(articleState.list[0].id);
    else startNewArticle();
  }).catch(function(err) {
    setArticleSaveStatus('Delete failed: ' + err.message, true);
  });
}

// ===== SIDEBAR STATE =====
var sidebarRetractTimer = null;

function applySidebarState(expanded, pinned) {
  var sb = document.querySelector('.sidebar');
  if (!sb) return;
  sb.classList.remove('is-expanded','is-collapsed','is-pinned');
  if (pinned) {
    sb.classList.add('is-pinned','is-expanded');
  } else if (expanded) {
    sb.classList.add('is-expanded');
  } else {
    sb.classList.add('is-collapsed');
  }
}

function sidebarEnter() {
  if (sidebarRetractTimer) {
    clearTimeout(sidebarRetractTimer);
    sidebarRetractTimer = null;
  }
  var sb = document.querySelector('.sidebar');
  if (!sb || sb.classList.contains('is-pinned')) return;
  applySidebarState(true, false);
}

function sidebarLeave() {
  var sb = document.querySelector('.sidebar');
  if (!sb || sb.classList.contains('is-pinned')) return;
  if (sidebarRetractTimer) clearTimeout(sidebarRetractTimer);
  sidebarRetractTimer = setTimeout(function() {
    applySidebarState(false, false);
    sidebarRetractTimer = null;
  }, 200);
}

function toggleSidebarPin() {
  var sb = document.querySelector('.sidebar');
  if (!sb) return;
  var wasPinned = sb.classList.contains('is-pinned');
  var newPinned = !wasPinned;
  localStorage.setItem('feats_admin_sidebar_pin', newPinned ? '1' : '');
  if (newPinned) {
    applySidebarState(true, true);
  } else {
    applySidebarState(false, false);
  }
}

// Init sidebar state from localStorage
(function() {
  var sb = document.querySelector('.sidebar');
  if (!sb) return;
  var isPinned = localStorage.getItem('feats_admin_sidebar_pin') === '1';
  if (isPinned) {
    applySidebarState(true, true);
  } else {
    applySidebarState(false, false);
  }
})();

// ===== UTILITIES =====
function uploadImage(file) {
  return new Promise(function(resolve, reject) {
    var ext = file.name.split('.').pop().toLowerCase();
    var key = 'uploads/' + Date.now() + '-' + Math.random().toString(36).slice(2,8) + '.' + ext;
    var reader = new FileReader();
    reader.onload = function(e) {
      var contentType = ext === 'png' ? 'image/png' : 'image/jpeg';
      fetch(API + '/images/' + key, {
        method: 'PUT',
        headers: Object.assign(apiHeaders(), { 'Content-Type': contentType }),
        body: new Blob([e.target.result], { type: contentType })
      }).then(function(r) {
        if (!r.ok) throw new Error('Upload failed: ' + r.status);
        resolve(API + '/images/' + key);
      }).catch(reject);
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function removeWriterPhoto(id) {
  if (!confirm('Remove this writer\'s photo?')) return;
  apiPut('/admin/writers/' + id, { name: document.getElementById('writerName').value, photo_url: '', bio: document.getElementById('writerBio').value })
    .then(function() { closeModal(); loadWriters(); })
    .catch(function(e) { alert('Error: ' + e.message); });
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
